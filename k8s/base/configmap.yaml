apiVersion: v1
kind: ConfigMap
metadata:
  name: gemma-runtime-config
data:
  MODEL_RUNTIME: auto
  MODEL_PREPARE_MODE: init
  SERVICE_PORT: "8080"
  MODEL_ALIAS: gemma-4
  MODEL_PATH: /models/model.gguf
  MODEL_URL: ""
  HF_MODEL_ID: ""
  HF_MODEL_REVISION: main
  OLLAMA_MODEL: ""
  OLLAMA_MODELS: /models/ollama
  CONTEXT_SIZE: "4096"
  BATCH_SIZE: "256"
  LLAMA_THREADS: "8"
  TORCH_NUM_THREADS: "8"
  MAX_NEW_TOKENS: "256"
  TEMPERATURE: "0.2"
  TOP_P: "0.95"
  TOP_K: "40"
  REPETITION_PENALTY: "1.1"
  TRUST_REMOTE_CODE: "false"
