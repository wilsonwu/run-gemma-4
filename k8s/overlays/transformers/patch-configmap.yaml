apiVersion: v1
kind: ConfigMap
metadata:
  name: gemma-runtime-config
data:
  MODEL_RUNTIME: transformers
  MODEL_ALIAS: gemma-4-transformers
  MODEL_PATH: /models/hf-model
  MODEL_URL: ""
  HF_MODEL_ID: your-hf-namespace/gemma-4-model
  HF_MODEL_REVISION: main
  OLLAMA_MODEL: ""
  TORCH_NUM_THREADS: "8"
  MAX_NEW_TOKENS: "256"
  TRUST_REMOTE_CODE: "true"
